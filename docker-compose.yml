version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trendcut}
      POSTGRES_USER: ${POSTGRES_USER:-trendcut}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trendcut}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      API_ENV: ${API_ENV:-local}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://trendcut:trendcut@postgres:5432/trendcut}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-internal-token}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  bff:
    build:
      context: .
      dockerfile: apps/bff/Dockerfile
    environment:
      BFF_HOST: ${BFF_HOST:-0.0.0.0}
      BFF_PORT: ${BFF_PORT:-3002}
      FASTAPI_BASE_URL: ${FASTAPI_BASE_URL:-http://api:8000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-internal-token}
      BFF_API_TOKEN: ${BFF_API_TOKEN:-dev-bff-token}
      BFF_ROLES: ${BFF_ROLES:-admin}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${BFF_PORT:-3002}:3002"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      FASTAPI_BASE_URL: ${WORKER_FASTAPI_BASE_URL:-http://api:8000}
      WORKER_QUEUE: ${WORKER_QUEUE:-video}
      WORKER_ARTIFACT_ROOT: ${WORKER_ARTIFACT_ROOT:-/app/data/worker-artifacts}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-internal-token}
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data/worker-artifacts:/app/data/worker-artifacts
      - ./data/uploads:/app/data/uploads

  legacy-express:
    profiles:
      - legacy
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      HOST: ${HOST:-0.0.0.0}
      ENABLE_LEGACY_EXPRESS: "true"
      AGENT_API_TOKEN: ${AGENT_API_TOKEN:-}
      AGENT_ENABLE_REAL_PUBLISH: ${AGENT_ENABLE_REAL_PUBLISH:-false}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-pro}
      XAI_API_KEY: ${XAI_API_KEY:-}
      COMFYUI_BASE_URL: ${COMFYUI_BASE_URL:-http://127.0.0.1:8188}
    volumes:
      - ./public/presets:/app/public/presets
      - ./data/uploads:/app/data/uploads
      - ./python/publish/browser_profiles:/app/python/publish/browser_profiles
      - ./python/publish/publish_jobs.db:/app/python/publish/publish_jobs.db

volumes:
  postgres-data:
  redis-data:
